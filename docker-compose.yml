services:
  web-panel:
    build:
      context: .
      dockerfile: Dockerfile
    image: harness-bench-panel:latest
    ports:
      - "8765:8765"
    volumes:
      # Mount data dir for SQLite persistence
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/benchmark.db
      - GIGACHAT_CREDENTIALS=${GIGACHAT_CREDENTIALS:-}
      - GIGACHAT_USER=${GIGACHAT_USER:-}
      - GIGACHAT_PASSWORD=${GIGACHAT_PASSWORD:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    restart: unless-stopped
